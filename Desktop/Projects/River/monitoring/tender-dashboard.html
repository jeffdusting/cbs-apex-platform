<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #f6f3ed;
            --cream: #ede8de;
            --warm: #d4c9b5;
            --muted: #8c8374;
            --accent: #c0562b;
            --accent-soft: #e8d5c4;
            --green: #3d7a4a;
            --green-soft: #d4e5d7;
            --amber: #b8860b;
            --amber-soft: #f0e4c4;
            --red: #b33a3a;
            --red-soft: #f0d4d4;
            --blue: #3a6b9b;
            --blue-soft: #d4e0f0;
            --purple: #6b4a8e;
            --purple-soft: #e0d4ed;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .serif { font-family: 'DM Serif Display', serif; }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.25rem 2.5rem; border-bottom: 1px solid var(--warm); background: var(--cream);
        }
        .topbar h1 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; letter-spacing: -0.02em; }
        .topbar h1 span { color: var(--muted); font-weight: 400; }
        .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-link {
            font-size: 0.8rem; color: var(--muted); text-decoration: none;
            border-bottom: 1px solid transparent; padding-bottom: 2px;
        }
        .nav-link:hover { color: var(--ink); border-bottom-color: var(--accent); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.live { background: var(--green); }
        .status-dot.error { background: var(--red); }
        .topbar-meta { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; }
        .refresh-btn {
            background: var(--ink); color: var(--paper); border: none;
            padding: 0.5rem 1.25rem; font-family: inherit; font-size: 0.8rem;
            font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
        }
        .refresh-btn:hover { background: var(--accent); }

        .layout {
            display: grid; grid-template-columns: 1fr 320px;
            min-height: calc(100vh - 62px);
        }

        .pipeline { padding: 2rem 2.5rem; overflow-y: auto; }

        .section-label {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--muted);
            margin-bottom: 1rem; margin-top: 2rem;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .section-label:first-of-type { margin-top: 0; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: var(--warm); }
        .count-badge {
            background: var(--ink); color: var(--paper); font-size: 0.65rem;
            padding: 0.15rem 0.5rem; border-radius: 2px; font-weight: 600;
        }
        .count-badge.urgent { background: var(--accent); }

        .card {
            background: white; border: 1px solid var(--warm); padding: 1.25rem 1.5rem;
            margin-bottom: 0.75rem; transition: all 0.15s; position: relative;
        }
        .card:hover { border-color: var(--ink); }
        .card.urgent { border-left: 4px solid var(--accent); }
        .card-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 1rem; margin-bottom: 0.5rem;
        }
        .card-title { font-weight: 600; font-size: 0.95rem; line-height: 1.35; flex: 1; }
        .card-ref {
            font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
            color: var(--muted); white-space: nowrap;
        }
        .card-meta {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;
            margin-top: 0.5rem; font-size: 0.78rem; color: var(--muted);
        }
        .source-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
            padding: 0.15rem 0.5rem; background: var(--cream); color: var(--ink);
        }
        .source-tag.austender   { background: var(--blue-soft);   color: var(--blue); }
        .source-tag.buy_nsw     { background: var(--green-soft);  color: var(--green); }
        .source-tag.buying_for_victoria { background: var(--purple-soft); color: var(--purple); }
        .source-tag.gets_nz     { background: var(--amber-soft);  color: var(--amber); }
        .source-tag.inland_rail { background: var(--red-soft);    color: var(--red); }
        .source-tag.other       { background: var(--accent-soft); color: var(--accent); }

        .interest-score {
            font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
            padding: 0.1rem 0.5rem; background: var(--green-soft); color: var(--green);
        }
        .interest-score.high { background: var(--green); color: white; }

        .card-reasons {
            margin-top: 0.6rem; font-size: 0.78rem; color: var(--muted);
            font-style: italic;
        }
        .card-actions {
            display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;
        }
        .btn {
            font-family: inherit; font-size: 0.78rem; font-weight: 600;
            padding: 0.5rem 1rem; border: 1px solid; cursor: pointer;
            transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-primary { background: var(--green); color: white; border-color: var(--green); }
        .btn-primary:hover { background: #2d5e38; }
        .btn-secondary { background: white; color: var(--ink); border-color: var(--warm); }
        .btn-secondary:hover { border-color: var(--ink); }
        .btn-danger { background: white; color: var(--red); border-color: var(--red-soft); }
        .btn-danger:hover { background: var(--red-soft); }
        .btn-link {
            background: none; border: none; color: var(--blue);
            text-transform: none; font-weight: 500; padding: 0.5rem 0;
            margin-left: auto; text-decoration: none;
        }
        .btn-link:hover { text-decoration: underline; }

        .stage-pill {
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
            padding: 0.15rem 0.5rem;
        }
        .stage-discovered      { background: var(--cream); color: var(--muted); }
        .stage-interest_passed { background: var(--blue-soft); color: var(--blue); }
        .stage-pursue          { background: var(--accent-soft); color: var(--accent); }
        .stage-ca_drafted      { background: var(--amber-soft); color: var(--amber); }
        .stage-ca_sent         { background: var(--purple-soft); color: var(--purple); }
        .stage-docs_received   { background: var(--green-soft); color: var(--green); }
        .stage-go_no_go_pending{ background: var(--accent); color: white; }
        .stage-go              { background: var(--green); color: white; }
        .stage-no_go           { background: var(--red-soft); color: var(--red); }
        .stage-withdrawn       { background: var(--cream); color: var(--muted); }

        .sidebar {
            border-left: 1px solid var(--warm); background: var(--cream);
            padding: 2rem 1.5rem; overflow-y: auto;
        }
        .stat-block { margin-bottom: 1.75rem; }
        .stat-number { font-family: 'DM Serif Display', serif; font-size: 2.5rem; line-height: 1; }
        .stat-number.urgent { color: var(--accent); }
        .stat-label {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--muted); margin-top: 0.25rem;
        }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
        .empty-state .serif { font-size: 1.5rem; color: var(--ink); margin-bottom: 0.5rem; }
        .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.85rem; }

        .filter-bar {
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .filter-btn {
            font-size: 0.75rem; padding: 0.35rem 0.75rem; border: 1px solid var(--warm);
            background: white; cursor: pointer; font-family: inherit;
        }
        .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        details.resolved-section { margin-top: 2rem; }
        details.resolved-section summary {
            cursor: pointer; font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
            padding: 0.5rem 0;
        }
        details.resolved-section summary::-webkit-details-marker { display: none; }
        details.resolved-section summary::before { content: '▸ '; color: var(--muted); }
        details.resolved-section[open] summary::before { content: '▾ '; }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { border-left: none; border-top: 1px solid var(--warm); }
        }

        .config-warning {
            background: var(--amber-soft); color: var(--amber); padding: 1rem 1.5rem;
            border-left: 4px solid var(--amber); margin-bottom: 1.5rem; font-size: 0.85rem;
        }
        .config-warning code { background: white; padding: 0.1rem 0.3rem; font-size: 0.85em; }

        /* Tab navigation */
        .tab-bar {
            display: flex; gap: 0; border-bottom: 1px solid var(--warm); background: var(--cream);
            padding: 0 2.5rem;
        }
        .tab-btn {
            font-family: inherit; font-size: 0.8rem; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase;
            padding: 0.75rem 1.5rem; border: none; background: none;
            color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .tab-btn:hover { color: var(--ink); }
        .tab-btn.active { color: var(--ink); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Evaluator tab */
        .eval-content { padding: 2rem 2.5rem; max-width: 1200px; }
        .eval-summary-bar {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem;
        }
        .eval-stat-card { background: white; border: 1px solid var(--warm); padding: 1.25rem; }
        .eval-stat-value { font-family: 'DM Serif Display', serif; font-size: 2rem; }
        .eval-stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }
        .eval-stat-card.good .eval-stat-value { color: var(--green); }
        .eval-stat-card.warn .eval-stat-value { color: var(--amber); }
        .eval-stat-card.bad .eval-stat-value { color: var(--red); }
        .eval-chart { display: flex; align-items: flex-end; gap: 0.5rem; height: 120px; margin-bottom: 2rem; }
        .eval-bar-group { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .eval-bar { width: 100%; min-height: 2px; transition: height 0.3s; }
        .eval-bar-label { font-size: 0.65rem; color: var(--muted); margin-top: 0.4rem; }
        .eval-bar-count { font-size: 0.7rem; font-weight: 600; margin-bottom: 0.3rem; }
        .eval-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--warm); }
        .eval-table th { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
             padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--warm); background: var(--cream); }
        .eval-table td { padding: 0.6rem 1rem; font-size: 0.85rem; border-bottom: 1px solid #f0ece4; }
        .eval-pass { color: var(--green); font-weight: 600; }
        .eval-fail { color: var(--red); font-weight: 600; }
        .eval-blocker { background: var(--red-soft); border: 1px solid var(--red); padding: 1rem; margin-bottom: 0.5rem; }
        .eval-blocker.none { background: var(--green-soft); border-color: var(--green); }
    </style>
</head>
<body>

<div class="topbar">
    <h1>River <span>Dashboard</span></h1>
    <div class="topbar-right">
        <a href="manager-dashboard.html" class="nav-link">← Review Queue</a>
        <div class="topbar-meta">
            <span class="status-dot live" id="conn-dot"></span>
            <span id="conn-status">Connecting...</span>
        </div>
        <span class="topbar-meta" id="last-refresh"></span>
        <button class="refresh-btn" onclick="loadAll()">Refresh</button>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('pipeline')">Tender Pipeline</button>
    <button class="tab-btn" onclick="switchTab('evaluator')">Evaluator</button>
</div>

<div id="tab-pipeline" class="tab-content active">
    <div class="layout">
        <div class="pipeline" id="pipeline">
            <div class="loading">Loading tender pipeline...</div>
        </div>
        <div class="sidebar" id="sidebar">
            <div class="loading">Loading...</div>
        </div>
    </div>
</div>

<div id="tab-evaluator" class="tab-content">
    <div class="eval-content">
        <div class="loading" id="eval-loading">Loading evaluator data...</div>
        <div id="eval-summary-bar" class="eval-summary-bar" style="display:none"></div>
        <div id="eval-chart-section" style="display:none">
            <div class="section-label">Score Distribution (Last 7 Days)</div>
            <div id="eval-chart" class="eval-chart"></div>
        </div>
        <div id="eval-table-section" style="display:none">
            <div class="section-label">Recent Evaluations</div>
            <div id="eval-table-container"></div>
        </div>
        <div id="eval-blocker-section" style="display:none">
            <div class="section-label">Blocked Work</div>
            <div id="eval-blockers"></div>
        </div>
    </div>
</div>

<script>
// --- Configuration ---
// When served from Vercel, all Supabase calls go through /api/supabase (serverless proxy).
// The service role key lives in Vercel env vars, never in this HTML.
// When served locally (serve.sh), falls back to direct Supabase with the key.
const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
const SUPABASE_DIRECT_URL = "https://eptugqwlgsmwhnubbqsk.supabase.co";
const SUPABASE_LOCAL_KEY = IS_LOCAL ? "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwdHVncXdsZ3Ntd2hudWJicXNrIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTcwOTM1NywiZXhwIjoyMDkxMjg1MzU3fQ.HWT6_4tPUfkDUUQbq6GK6BZAx6KxEiA5XufM1Uqi7kg" : null;

let allTenders = [];
let stageFilter = "active"; // active | all | resolved

// --- Fetch helpers: proxy on Vercel, direct on localhost ---
function supaFetchUrl(restPath) {
    if (IS_LOCAL) {
        return `${SUPABASE_DIRECT_URL}/rest/v1${restPath}`;
    }
    // Vercel proxy — encode restPath as ?path= param
    const base = `/api/supabase?path=${encodeURIComponent('/rest/v1' + restPath)}`;
    return base;
}

function supaFetchHeaders(extra) {
    if (IS_LOCAL) {
        return { "apikey": SUPABASE_LOCAL_KEY, "Authorization": `Bearer ${SUPABASE_LOCAL_KEY}`,
                 "Content-Type": "application/json", ...extra };
    }
    return { "Content-Type": "application/json", ...extra };
}

async function supaGet(path) {
    try {
        const r = await fetch(supaFetchUrl(path), { headers: supaFetchHeaders({"Prefer": "return=representation"}) });
        if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
        return await r.json();
    } catch (e) {
        console.error(`GET ${path}:`, e);
        document.getElementById("conn-status").textContent = `Error: ${e.message}`;
        document.getElementById("conn-dot").className = "status-dot error";
        return null;
    }
}

async function supaPatch(path, body) {
    try {
        const r = await fetch(supaFetchUrl(path), {
            method: "PATCH", headers: supaFetchHeaders({"Prefer": "return=representation"}),
            body: JSON.stringify(body),
        });
        return r.ok;
    } catch (e) { console.error(`PATCH ${path}:`, e); return false; }
}

async function supaPost(path, body) {
    try {
        const r = await fetch(supaFetchUrl(path), {
            method: "POST", headers: supaFetchHeaders({"Prefer": "return=representation"}),
            body: JSON.stringify(body),
        });
        return r.ok;
    } catch (e) { console.error(`POST ${path}:`, e); return false; }
}

function timeAgo(iso) {
    if (!iso) return "";
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
}

function escHtml(s) {
    if (s == null) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function loadAll() {
    document.getElementById("conn-status").textContent = "Loading...";
    const tenders = await supaGet("/tender_register?select=*&order=created_at.desc&limit=500");
    if (!tenders) return;

    document.getElementById("conn-dot").className = "status-dot live";
    document.getElementById("conn-status").textContent = "Connected";
    document.getElementById("last-refresh").textContent = new Date().toLocaleTimeString();

    allTenders = tenders;
    render();
    renderSidebar();
}

function render() {
    const el = document.getElementById("pipeline");
    const t = allTenders;

    const review = t.filter(x => x.lifecycle_stage === "interest_passed");
    const inProgress = t.filter(x => ["pursue","ca_drafted","ca_sent"].includes(x.lifecycle_stage));
    const docsReady = t.filter(x => x.lifecycle_stage === "docs_received");
    const goNoGo = t.filter(x => x.lifecycle_stage === "go_no_go_pending");
    const resolved = t.filter(x => ["go","no_go","withdrawn","interest_failed"].includes(x.lifecycle_stage));

    let html = `
        <div class="filter-bar">
            <button class="filter-btn ${stageFilter==='active'?'active':''}" onclick="setFilter('active')">Active</button>
            <button class="filter-btn ${stageFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
            <button class="filter-btn ${stageFilter==='resolved'?'active':''}" onclick="setFilter('resolved')">Resolved</button>
        </div>
    `;

    if (stageFilter === "resolved") {
        html += sectionWithCards("Resolved", resolved, "resolved");
    } else if (stageFilter === "all") {
        html += sectionWithCards("Awaiting Your Review", review, "review", true);
        html += sectionWithCards("Awaiting Go/No-Go Decision", goNoGo, "gng", true);
        html += sectionWithCards("Docs Received — Pending Analysis", docsReady, "docs");
        html += sectionWithCards("In Progress", inProgress, "progress");
        html += `<details class="resolved-section"><summary>Resolved (${resolved.length})</summary>
                 ${sectionInner(resolved, "resolved")}</details>`;
    } else {
        // Active default
        if (review.length === 0 && goNoGo.length === 0 && docsReady.length === 0 && inProgress.length === 0) {
            html += `<div class="empty-state">
                <p class="serif">All quiet</p>
                <p>No tenders need attention right now.</p>
            </div>`;
        } else {
            html += sectionWithCards("Awaiting Your Review", review, "review", true);
            html += sectionWithCards("Awaiting Go/No-Go Decision", goNoGo, "gng", true);
            html += sectionWithCards("Docs Received — Pending Analysis", docsReady, "docs");
            html += sectionWithCards("In Progress", inProgress, "progress");
        }
    }
    el.innerHTML = html;
}

function sectionWithCards(label, items, key, urgent=false) {
    if (items.length === 0) return "";
    const badge = urgent && items.length > 0 ? `<span class="count-badge urgent">${items.length}</span>` : `<span class="count-badge">${items.length}</span>`;
    return `<div class="section-label">${escHtml(label)} ${badge}</div>${sectionInner(items, key)}`;
}

function sectionInner(items, key) {
    if (items.length === 0) return "";
    return items.map(t => renderCard(t, key)).join("");
}

function renderCard(t, contextKey) {
    const reasons = (t.interest_reasons || []);
    const reasonStr = Array.isArray(reasons) ? reasons.join(" • ") : "";
    const score = (t.interest_score != null) ? t.interest_score.toFixed(2) : "—";
    const scoreClass = (t.interest_score >= 0.7) ? "high" : "";
    const isUrgent = ["interest_passed","go_no_go_pending"].includes(t.lifecycle_stage);

    let actions = "";
    switch (t.lifecycle_stage) {
        case "interest_passed":
            actions = `
                <button class="btn btn-primary" onclick="markPursue(${t.id})">Pursue</button>
                <button class="btn btn-secondary" onclick="markSkip(${t.id})">Skip</button>
                ${t.url ? `<a class="btn-link" href="${escHtml(t.url)}" target="_blank">Open portal ↗</a>` : ''}`;
            break;
        case "pursue":
            actions = `<span class="stage-pill stage-pursue">CA DRAFT IN QUEUE</span>
                ${t.url ? `<a class="btn-link" href="${escHtml(t.url)}" target="_blank">Open portal ↗</a>` : ''}
                <button class="btn btn-danger" onclick="markWithdrawn(${t.id})">Withdraw</button>`;
            break;
        case "ca_drafted":
            if (t.ca_send_approved) {
                actions = `<span class="stage-pill" style="background:var(--green-soft);color:var(--green)">CA Send Approved</span>
                    <button class="btn btn-primary" onclick="markCaSent(${t.id})">Mark CA Sent</button>
                    <button class="btn btn-danger" onclick="markWithdrawn(${t.id})">Withdraw</button>`;
            } else {
                actions = `<button class="btn btn-primary" onclick="approveCaSend(${t.id})">Approve CA Send</button>
                    <button class="btn btn-danger" onclick="markWithdrawn(${t.id})">Withdraw</button>`;
            }
            break;
        case "ca_sent":
            actions = `<span class="stage-pill stage-ca_sent">AWAITING DOCS</span>
                <button class="btn btn-secondary" onclick="markDocsReceived(${t.id})">Docs Received (manual)</button>
                <button class="btn btn-danger" onclick="markWithdrawn(${t.id})">Withdraw</button>`;
            break;
        case "docs_received":
            actions = `<span class="stage-pill stage-docs_received">QUEUED FOR GO/NO-GO ANALYSIS</span>
                ${t.drive_folder_url ? `<a class="btn-link" href="${escHtml(t.drive_folder_url)}" target="_blank">Drive folder ↗</a>` : ''}`;
            break;
        case "go_no_go_pending":
            actions = `<button class="btn btn-primary" onclick="decideGo(${t.id})">Decide GO</button>
                <button class="btn btn-danger" onclick="decideNoGo(${t.id})">Decide NO-GO</button>
                ${t.drive_folder_url ? `<a class="btn-link" href="${escHtml(t.drive_folder_url)}" target="_blank">Drive folder ↗</a>` : ''}`;
            break;
        default:
            actions = `<span class="stage-pill stage-${t.lifecycle_stage}">${t.lifecycle_stage.replace(/_/g," ").toUpperCase()}</span>`;
    }

    const close = t.close_date ? `closes ${escHtml(t.close_date)}` : "";
    const value = t.estimated_value ? escHtml(t.estimated_value) : "";

    return `
    <div class="card ${isUrgent ? 'urgent' : ''}" id="tender-${t.id}">
        <div class="card-header">
            <div class="card-title">${escHtml(t.title || '(untitled)')}</div>
            <div class="card-ref">${escHtml(t.reference || '')}</div>
        </div>
        <div class="card-meta">
            <span class="source-tag ${escHtml(t.source || 'other')}">${escHtml((t.source || 'other').replace(/_/g,' '))}</span>
            ${t.agency ? `<span>${escHtml(t.agency)}</span>` : ''}
            ${close ? `<span>${close}</span>` : ''}
            ${value ? `<span>${value}</span>` : ''}
            <span class="interest-score ${scoreClass}">interest ${score}</span>
            <span style="margin-left:auto">${timeAgo(t.created_at)}</span>
        </div>
        ${reasonStr ? `<div class="card-reasons">${escHtml(reasonStr)}</div>` : ''}
        <div class="card-actions">${actions}</div>
    </div>`;
}

function setFilter(f) { stageFilter = f; render(); }

function renderSidebar() {
    const t = allTenders;
    const counts = {};
    for (const x of t) {
        counts[x.lifecycle_stage] = (counts[x.lifecycle_stage] || 0) + 1;
    }
    const review = counts.interest_passed || 0;
    const gng = counts.go_no_go_pending || 0;
    const inFlight = (counts.pursue||0) + (counts.ca_drafted||0) + (counts.ca_sent||0) + (counts.docs_received||0);
    const won = counts.go || 0;
    const sources = {};
    for (const x of t) {
        if (["interest_passed","pursue","ca_drafted","ca_sent","docs_received","go_no_go_pending"].includes(x.lifecycle_stage)) {
            sources[x.source || 'other'] = (sources[x.source || 'other'] || 0) + 1;
        }
    }

    let html = `
    <div class="stat-block">
        <div class="stat-number ${review>0?'urgent':''}">${review}</div>
        <div class="stat-label">Awaiting Review</div>
    </div>
    <div class="stat-block">
        <div class="stat-number ${gng>0?'urgent':''}">${gng}</div>
        <div class="stat-label">Go/No-Go Pending</div>
    </div>
    <div class="stat-block">
        <div class="stat-number">${inFlight}</div>
        <div class="stat-label">In Flight</div>
    </div>
    <div class="stat-block">
        <div class="stat-number">${won}</div>
        <div class="stat-label">Pursued (GO)</div>
    </div>
    <div class="section-label" style="margin-top:1rem">Active by Source</div>
    `;
    for (const [src, n] of Object.entries(sources).sort((a,b) => b[1]-a[1])) {
        html += `<div style="display:flex;justify-content:space-between;font-size:0.8rem;padding:0.35rem 0;border-bottom:1px solid rgba(0,0,0,0.05)">
            <span class="source-tag ${escHtml(src)}">${escHtml(src.replace(/_/g,' '))}</span>
            <span class="mono">${n}</span>
        </div>`;
    }
    document.getElementById("sidebar").innerHTML = html;
}

// --- Lifecycle transition actions ---
async function transition(id, toStage, extraFields={}, rationale="") {
    const tender = allTenders.find(x => x.id === id);
    if (!tender) return;
    const fromStage = tender.lifecycle_stage;
    const patch = { lifecycle_stage: toStage, ...extraFields };
    const ok = await supaPatch(`/tender_register?id=eq.${id}`, patch);
    if (ok) {
        await supaPost(`/tender_lifecycle_log`, {
            tender_id: id, from_stage: fromStage, to_stage: toStage,
            actor: "human:dashboard", rationale: rationale
        });
        await loadAll();
    }
}

function markPursue(id)        { transition(id, "pursue", { pursue_decided_by: "jeff", pursue_decided_at: new Date().toISOString() }, "Pursued from dashboard"); }
function markSkip(id)          { transition(id, "interest_failed", { pursue_decided_by: "jeff", pursue_decided_at: new Date().toISOString() }, "Skipped from dashboard"); }
function markCaSent(id)        { transition(id, "ca_sent", { ca_sent_at: new Date().toISOString() }, "Marked sent from dashboard"); }
function markDocsReceived(id)  { transition(id, "docs_received", { docs_received_at: new Date().toISOString() }, "Manually marked docs received"); }
function decideGo(id)          { transition(id, "go", { decision: "go", decision_by: "jeff", decision_date: new Date().toISOString() }, "GO decision"); }
function decideNoGo(id)        {
    const reason = prompt("NO-GO rationale (required):");
    if (!reason) return;
    transition(id, "no_go", { decision: "no_go", decision_by: "jeff", decision_date: new Date().toISOString(), decision_notes: reason }, reason);
}
async function approveCaSend(id) {
    const tender = allTenders.find(x => x.id === id);
    if (!tender) return;
    if (!confirm(`Approve CA send for "${tender.title}"?\n\nThis will allow the agent to send the confidentiality agreement.`)) return;
    const ok = await supaPatch(`/tender_register?id=eq.${id}`, {
        ca_send_approved: true,
        ca_send_approved_by: "jeff",
        ca_send_approved_at: new Date().toISOString(),
    });
    if (ok) {
        await supaPost("/tender_lifecycle_log", {
            tender_id: id, from_stage: "ca_drafted", to_stage: "ca_drafted",
            actor: "jeff (dashboard)", rationale: "CA send approved via dashboard",
        });
        await loadAll();
    }
}

function markWithdrawn(id)     {
    const reason = prompt("Withdrawal rationale:");
    if (reason === null) return;
    transition(id, "withdrawn", { decision: "withdrawn", decision_by: "jeff", decision_date: new Date().toISOString(), decision_notes: reason }, reason);
}

// --- Tab switching ---
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`#tab-${tab}`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
        if (b.textContent.toLowerCase().includes(tab === 'pipeline' ? 'pipeline' : 'evaluator')) b.classList.add('active');
    });
    if (tab === 'evaluator' && !evalLoaded) loadEvaluator();
}

// --- Evaluator tab data ---
let evalLoaded = false;

async function loadEvaluator() {
    const sevenDaysAgo = new Date(Date.now() - 7*86400000).toISOString();
    const oneDayAgo = new Date(Date.now() - 86400000).toISOString();

    const [scores, proposals, blockers] = await Promise.all([
        supaGet(`/evaluation_scores?created_at=gte.${sevenDaysAgo}&order=created_at.desc&limit=200`),
        supaGet(`/correction_proposals?status=eq.pending&select=id`),
        supaGet(`/agent_traces?error=not.is.null&created_at=gte.${oneDayAgo}&select=agent_role,task_type,error&limit=50`),
    ]);

    if (!scores || !proposals || !blockers) return;
    evalLoaded = true;
    document.getElementById("eval-loading").style.display = "none";

    // Summary bar
    const total = scores.length;
    const passing = scores.filter(s => s.score_composite >= 3.5).length;
    const rate = total > 0 ? Math.round(passing / total * 100) : 0;
    const avg = total > 0 ? (scores.reduce((a, s) => a + (s.score_composite || 0), 0) / total).toFixed(1) : "\u2014";
    const pending = proposals.length;

    const bar = document.getElementById("eval-summary-bar");
    bar.style.display = "grid";
    bar.innerHTML = `
        <div class="eval-stat-card"><div class="eval-stat-value">${total}</div><div class="eval-stat-label">Evaluations (7d)</div></div>
        <div class="eval-stat-card ${rate >= 70 ? 'good' : rate >= 50 ? 'warn' : 'bad'}"><div class="eval-stat-value">${rate}%</div><div class="eval-stat-label">Pass Rate</div></div>
        <div class="eval-stat-card"><div class="eval-stat-value">${avg}</div><div class="eval-stat-label">Avg Score</div></div>
        <div class="eval-stat-card ${pending === 0 ? 'good' : 'warn'}"><div class="eval-stat-value">${pending}</div><div class="eval-stat-label">Pending Corrections</div></div>
    `;

    // Score distribution chart
    const bands = { "1-2": 0, "2-3": 0, "3-4": 0, "4-5": 0 };
    const colours = { "1-2": "var(--red)", "2-3": "var(--amber)", "3-4": "var(--blue)", "4-5": "var(--green)" };
    for (const s of scores) {
        const c = s.score_composite || 0;
        if (c < 2) bands["1-2"]++;
        else if (c < 3) bands["2-3"]++;
        else if (c < 4) bands["3-4"]++;
        else bands["4-5"]++;
    }
    const maxCount = Math.max(...Object.values(bands), 1);
    const chartEl = document.getElementById("eval-chart");
    document.getElementById("eval-chart-section").style.display = "block";
    chartEl.innerHTML = Object.entries(bands).map(([label, count]) => `
        <div class="eval-bar-group">
            <div class="eval-bar-count">${count}</div>
            <div class="eval-bar" style="height:${Math.max(count/maxCount*100, 2)}px;background:${colours[label]}"></div>
            <div class="eval-bar-label">${label}</div>
        </div>
    `).join("");

    // Recent evaluations table
    const tableEl = document.getElementById("eval-table-container");
    document.getElementById("eval-table-section").style.display = "block";
    const recent = scores.slice(0, 20);
    let tableHtml = `<table class="eval-table"><thead><tr><th>Date</th><th>Agent</th><th>Task</th><th>Score</th><th>Result</th><th>Reviewed</th></tr></thead><tbody>`;
    for (const s of recent) {
        const d = new Date(s.created_at).toLocaleDateString("en-AU", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
        const sc = s.score_composite ? s.score_composite.toFixed(1) : "\u2014";
        const pass = s.score_composite >= 3.5;
        tableHtml += `<tr>
            <td class="mono" style="font-size:0.75rem">${escHtml(d)}</td>
            <td>${escHtml(s.evaluation_mode || "\u2014")}</td>
            <td>\u2014</td>
            <td class="mono">${sc}</td>
            <td class="${pass ? 'eval-pass' : 'eval-fail'}">${pass ? 'PASS' : 'FAIL'}</td>
            <td>${s.human_reviewed ? '\u2713' : '\u2014'}</td>
        </tr>`;
    }
    tableHtml += "</tbody></table>";
    tableEl.innerHTML = tableHtml;

    // Blockers
    const blockerEl = document.getElementById("eval-blockers");
    document.getElementById("eval-blocker-section").style.display = "block";
    if (blockers.length === 0) {
        blockerEl.innerHTML = `<div class="eval-blocker none"><div style="font-weight:600;font-size:0.85rem">No blocked work detected</div></div>`;
    } else {
        const grouped = {};
        for (const b of blockers) {
            const key = (b.error || "").substring(0, 60);
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(b);
        }
        blockerEl.innerHTML = Object.entries(grouped).map(([err, items]) => `
            <div class="eval-blocker">
                <div style="font-weight:600;font-size:0.85rem">${escHtml(err)}</div>
                <div style="font-size:0.8rem;color:var(--muted);margin-top:0.25rem">${items.length} trace(s) \u2014 agents: ${escHtml([...new Set(items.map(i => i.agent_role))].join(", "))}</div>
            </div>
        `).join("");
    }
}

loadAll();
setInterval(loadAll, 60000);
</script>
